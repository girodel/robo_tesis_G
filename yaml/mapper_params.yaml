slam_toolbox:
  ros__parameters:
    use_sim_time: true
    
    # Nombres de los "huesos" de tu robot
    odom_frame: tetrabot/odom
    base_frame: tetrabot/base_footprint
    map_frame: map
    
    # El tópico de tu Lidar 2D
    scan_topic: /scan
    
    # Parámetros del mapa
    resolution: 0.05
    max_laser_range: 10.0
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    mode: mapping